<?xml version="1.0" encoding="UTF-8"?>
<!-- Lightweight Apple-like ecosystem icon pattern (light colors) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      /* Icons darkened ~10% to a neutral Apple-like grey */
      .icon { fill:#d4d7d9; stroke:none; }
      /* Accent changed to a subtle grey to keep pattern monochrome */
      .accent { fill:#bfc3c6; }
      .soft { opacity:0.9; }
    </style>

    <!-- Simple symbol set: phone, watch, earbuds, tv, home, laptop, remote -->
    <symbol id="phone" viewBox="0 0 24 24">
      <rect x="6" y="2" width="12" height="20" rx="2.2" class="icon" />
      <rect x="10.5" y="18" width="3" height="1" rx="0.5" class="icon" opacity="0.85" />
    </symbol>

    <symbol id="watch" viewBox="0 0 24 24">
      <rect x="8.5" y="4" width="7" height="16" rx="2.2" class="icon" />
      <rect x="10.5" y="8" width="3" height="8" rx="1" class="icon" opacity="0.85" />
    </symbol>

    <symbol id="earbuds" viewBox="0 0 24 24">
      <circle cx="8" cy="11" r="2.7" class="icon" />
      <circle cx="16" cy="11" r="2.7" class="icon" />
      <rect x="7.2" y="13.5" width="1" height="3" rx="0.5" class="icon" opacity="0.9" />
      <rect x="15.8" y="13.5" width="1" height="3" rx="0.5" class="icon" opacity="0.9" />
    </symbol>

    <symbol id="tv" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="12" rx="1.6" class="icon" />
      <rect x="10" y="18" width="4" height="1.5" rx="0.5" class="icon" opacity="0.9" />
    </symbol>

    <symbol id="home" viewBox="0 0 24 24">
      <path d="M3 11.5 L12 4 L21 11.5 V20 H14 V14 H10 V20 H3 Z" class="icon" />
    </symbol>

    <symbol id="laptop" viewBox="0 0 24 24">
      <rect x="2" y="6" width="20" height="11" rx="1.5" class="icon" />
      <rect x="6" y="18" width="12" height="1.2" rx="0.6" class="icon" opacity="0.9" />
    </symbol>

    <symbol id="remote" viewBox="0 0 24 24">
      <rect x="9.5" y="3" width="5" height="16" rx="1.6" class="icon" />
      <circle cx="12" cy="6" r="0.9" class="icon" opacity="0.95" />
    </symbol>

  </defs>

  <!-- background fill (very light) -->
  <rect width="100%" height="100%" fill="#fafbfc" />

  <!-- Tiled group of icons placed with slight rotations and offsets for a scattered pattern -->
  <g transform="translate(80,60) scale(1.1)" class="soft">
    <use href="#phone" x="0" y="0" transform="rotate(-18 12 12)" />
    <use href="#watch" x="140" y="-10" transform="rotate(12 12 12)" />
    <use href="#earbuds" x="280" y="40" transform="rotate(-6 12 12)" />
    <use href="#tv" x="420" y="-8" transform="rotate(10 12 12)" />
    <use href="#home" x="560" y="24" transform="rotate(-14 12 12)" />
    <use href="#laptop" x="700" y="6" transform="rotate(8 12 12)" />
    <use href="#remote" x="840" y="30" transform="rotate(-10 12 12)" />

    <use href="#phone" x="60" y="160" transform="rotate(14 12 12)" opacity="0.95" />
    <use href="#earbuds" x="200" y="140" transform="rotate(-8 12 12)" />
    <use href="#watch" x="340" y="170" transform="rotate(6 12 12)" />
    <use href="#tv" x="480" y="150" transform="rotate(-12 12 12)" />
    <use href="#laptop" x="620" y="160" transform="rotate(2 12 12)" />
    <use href="#home" x="760" y="140" transform="rotate(-6 12 12)" />
  </g>

  <!-- Accent small spots (orange) to echo the sample image -->
  <g transform="translate(30,420) scale(0.9)">
    <use href="#phone" x="0" y="0" class="accent" transform="rotate(-8 12 12) scale(0.85)" />
    <use href="#watch" x="260" y="40" class="accent" transform="rotate(18 12 12) scale(0.75)" />
    <use href="#earbuds" x="520" y="-10" class="accent" transform="rotate(-4 12 12) scale(0.7)" />
  </g>

</svg>
